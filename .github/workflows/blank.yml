name: Remote SSH with ngrok
on: [workflow_dispatch] # Manual trigger

jobs:
  ssh-access:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install and Setup ngrok
        run: |
          # Install ngrok via script
          curl -s https://ngrok-agent.s3.amazonaws.com/ngrok.asc | sudo tee /etc/apt/trusted.gpg.d/ngrok.asc >/dev/null
          echo "deb https://ngrok-agent.s3.amazonaws.com buster main" | sudo tee /etc/apt/sources.list.d/ngrok.list
          sudo apt update && sudo apt install ngrok
          
          # Authenticate (Store your token in Repo Secrets)
          ngrok config add-authtoken ${{ secrets.NGROK_AUTH_TOKEN }}

      - name: Start SSH Tunnel
        run: |
          # Start ngrok tunnel for SSH (Port 22) in the background
          ngrok tcp 22 --log=stdout > ngrok.log &
          
          # Give it a few seconds to start
          sleep 5
          
          # Extract the public URL from the log or API
          curl -s http://localhost:4040/api/tunnels | jq -r '.tunnels[0].public_url'
          
          # Keep the job running so the tunnel doesn't close
          # This will run until the 6-hour GitHub limit
          sleep 21600
